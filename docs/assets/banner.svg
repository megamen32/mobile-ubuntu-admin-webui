<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C001E"/>
      <stop offset="50%" stop-color="#3D0E2C"/>
      <stop offset="100%" stop-color="#1A0E1A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E95420"/>
      <stop offset="100%" stop-color="#FF7B3A"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>

  <!-- Decorative terminal-style circles -->
  <circle cx="80" cy="60" r="6" fill="#FF5F56"/>
  <circle cx="104" cy="60" r="6" fill="#FFBD2E"/>
  <circle cx="128" cy="60" r="6" fill="#27C93F"/>

  <!-- Logo block -->
  <g transform="translate(80, 120)">
    <rect x="0" y="0" width="120" height="120" rx="24" fill="url(#accent)" opacity="0.15"/>
    <rect x="0" y="0" width="120" height="120" rx="24" fill="none" stroke="url(#accent)" stroke-width="2"/>

    <!-- Ubuntu-style circle of friends (simplified) -->
    <circle cx="60" cy="60" r="14" fill="url(#accent)"/>
    <circle cx="60" cy="20" r="10" fill="url(#accent)" opacity="0.85"/>
    <circle cx="95" cy="80" r="10" fill="url(#accent)" opacity="0.85"/>
    <circle cx="25" cy="80" r="10" fill="url(#accent)" opacity="0.85"/>

    <!-- Power symbol overlay -->
    <g transform="translate(60, 60)" filter="url(#glow)">
      <path d="M 0 -14 A 14 14 0 1 1 -10 10" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="-14" x2="0" y2="-4" stroke="white" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Title -->
  <text x="240" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1">
    Ubuntu Admin
  </text>
  <text x="240" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="500" fill="#E95420" letter-spacing="0.5">
    Mobile-first server control panel
  </text>
  <text x="240" y="240" font-family="monospace" font-size="14" fill="#9B8E9B">
    $ systemctl start nginx.service &amp;&amp; journalctl -u nginx -f
  </text>

  <!-- Feature badges -->
  <g transform="translate(240, 270)">
    <g>
      <rect x="0" y="0" width="120" height="32" rx="16" fill="white" fill-opacity="0.08"/>
      <text x="60" y="21" text-anchor="middle" font-family="monospace" font-size="12" fill="#E0D8D8">systemd</text>
    </g>
    <g transform="translate(132, 0)">
      <rect x="0" y="0" width="100" height="32" rx="16" fill="white" fill-opacity="0.08"/>
      <text x="50" y="21" text-anchor="middle" font-family="monospace" font-size="12" fill="#E0D8D8">PTY</text>
    </g>
    <g transform="translate(244, 0)">
      <rect x="0" y="0" width="100" height="32" rx="16" fill="white" fill-opacity="0.08"/>
      <text x="50" y="21" text-anchor="middle" font-family="monospace" font-size="12" fill="#E0D8D8">files</text>
    </g>
    <g transform="translate(356, 0)">
      <rect x="0" y="0" width="110" height="32" rx="16" fill="white" fill-opacity="0.08"/>
      <text x="55" y="21" text-anchor="middle" font-family="monospace" font-size="12" fill="#E0D8D8">journalctl</text>
    </g>
    <g transform="translate(478, 0)">
      <rect x="0" y="0" width="100" height="32" rx="16" fill="white" fill-opacity="0.08"/>
      <text x="50" y="21" text-anchor="middle" font-family="monospace" font-size="12" fill="#E0D8D8">mobile</text>
    </g>
  </g>

  <!-- Right-side code snippet -->
  <g transform="translate(820, 60)">
    <rect x="0" y="0" width="320" height="240" rx="12" fill="black" fill-opacity="0.4" stroke="white" stroke-opacity="0.1"/>
    <!-- Window chrome -->
    <circle cx="16" cy="16" r="4" fill="#FF5F56"/>
    <circle cx="32" cy="16" r="4" fill="#FFBD2E"/>
    <circle cx="48" cy="16" r="4" fill="#27C93F"/>
    <!-- Code -->
    <text x="16" y="56" font-family="monospace" font-size="12" fill="#9B8E9B">  1</text>
    <text x="40" y="56" font-family="monospace" font-size="12" fill="#A555B9">const</text>
    <text x="86" y="56" font-family="monospace" font-size="12" fill="#3B73D4">terminal</text>
    <text x="158" y="56" font-family="monospace" font-size="12" fill="#E0D8D8">=</text>
    <text x="172" y="56" font-family="monospace" font-size="12" fill="#0E8C2E">"pty"</text>

    <text x="16" y="80" font-family="monospace" font-size="12" fill="#9B8E9B">  2</text>
    <text x="40" y="80" font-family="monospace" font-size="12" fill="#3B73D4">await</text>
    <text x="92" y="80" font-family="monospace" font-size="12" fill="#F99B11">connect</text>
    <text x="152" y="80" font-family="monospace" font-size="12" fill="#E0D8D8">()</text>

    <text x="16" y="104" font-family="monospace" font-size="12" fill="#9B8E9B">  3</text>
    <text x="40" y="104" font-family="monospace" font-size="12" fill="#E0D8D8">term.</text>
    <text x="80" y="104" font-family="monospace" font-size="12" fill="#F99B11">write</text>
    <text x="120" y="104" font-family="monospace" font-size="12" fill="#E0D8D8">(</text>
    <text x="128" y="104" font-family="monospace" font-size="12" fill="#0E8C2E">"ls /"</text>
    <text x="172" y="104" font-family="monospace" font-size="12" fill="#E0D8D8">)</text>

    <text x="16" y="128" font-family="monospace" font-size="12" fill="#9B8E9B">  4</text>
    <text x="40" y="128" font-family="monospace" font-size="12" fill="#9B8E9B">// → bin  etc  home  root  usr  var</text>

    <text x="16" y="156" font-family="monospace" font-size="12" fill="#9B8E9B">  5</text>
    <text x="40" y="156" font-family="monospace" font-size="12" fill="#A555B9">const</text>
    <text x="86" y="156" font-family="monospace" font-size="12" fill="#3B73D4">service</text>
    <text x="158" y="156" font-family="monospace" font-size="12" fill="#E0D8D8">=</text>
    <text x="172" y="156" font-family="monospace" font-size="12" fill="#0E8C2E">"nginx"</text>

    <text x="16" y="180" font-family="monospace" font-size="12" fill="#9B8E9B">  6</text>
    <text x="40" y="180" font-family="monospace" font-size="12" fill="#3B73D4">await</text>
    <text x="92" y="180" font-family="monospace" font-size="12" fill="#F99B11">start</text>
    <text x="132" y="180" font-family="monospace" font-size="12" fill="#E0D8D8">(service)</text>

    <text x="16" y="208" font-family="monospace" font-size="12" fill="#0E8C2E">✓ 200 OK · 87ms</text>

    <text x="16" y="232" font-family="monospace" font-size="12" fill="#9B8E9B">  9</text>
    <text x="40" y="232" font-family="monospace" font-size="12" fill="#9B8E9B">// cached · refreshed in background</text>
  </g>
</svg>
