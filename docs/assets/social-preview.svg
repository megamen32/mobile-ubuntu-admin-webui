<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C001E"/>
      <stop offset="50%" stop-color="#4A1535"/>
      <stop offset="100%" stop-color="#1A0E1A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E95420"/>
      <stop offset="100%" stop-color="#FF7B3A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E95420" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E95420" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Glow accents -->
  <circle cx="200" cy="200" r="300" fill="url(#glow)"/>
  <circle cx="1100" cy="500" r="280" fill="url(#glow)"/>

  <!-- Logo -->
  <g transform="translate(120, 220)">
    <rect x="0" y="0" width="180" height="180" rx="36" fill="url(#accent)" opacity="0.15"/>
    <rect x="0" y="0" width="180" height="180" rx="36" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <g transform="translate(90, 90)">
      <circle cx="0" cy="0" r="22" fill="url(#accent)"/>
      <circle cx="0" cy="-60" r="14" fill="url(#accent)" opacity="0.85"/>
      <circle cx="52" cy="30" r="14" fill="url(#accent)" opacity="0.85"/>
      <circle cx="-52" cy="30" r="14" fill="url(#accent)" opacity="0.85"/>
    </g>
  </g>

  <!-- Title -->
  <text x="340" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="96" font-weight="800" fill="white" letter-spacing="-2">
    Ubuntu Admin
  </text>
  <text x="340" y="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="500" fill="#E95420">
    Mobile-first server control panel
  </text>
  <text x="340" y="380" font-family="monospace" font-size="20" fill="#9B8E9B">
    systemd · PTY terminal · files · journalctl
  </text>

  <!-- Tech badges -->
  <g transform="translate(340, 430)">
    <g>
      <rect x="0" y="0" width="130" height="36" rx="18" fill="white" fill-opacity="0.1"/>
      <text x="65" y="24" text-anchor="middle" font-family="monospace" font-size="14" fill="#E0D8D8">Next.js 16</text>
    </g>
    <g transform="translate(146, 0)">
      <rect x="0" y="0" width="120" height="36" rx="18" fill="white" fill-opacity="0.1"/>
      <text x="60" y="24" text-anchor="middle" font-family="monospace" font-size="14" fill="#E0D8D8">TypeScript</text>
    </g>
    <g transform="translate(282, 0)">
      <rect x="0" y="0" width="110" height="36" rx="18" fill="white" fill-opacity="0.1"/>
      <text x="55" y="24" text-anchor="middle" font-family="monospace" font-size="14" fill="#E0D8D8">node-pty</text>
    </g>
    <g transform="translate(408, 0)">
      <rect x="0" y="0" width="110" height="36" rx="18" fill="white" fill-opacity="0.1"/>
      <text x="55" y="24" text-anchor="middle" font-family="monospace" font-size="14" fill="#E0D8D8">xterm.js</text>
    </g>
    <g transform="translate(534, 0)">
      <rect x="0" y="0" width="140" height="36" rx="18" fill="white" fill-opacity="0.1"/>
      <text x="70" y="24" text-anchor="middle" font-family="monospace" font-size="14" fill="#E0D8D8">CodeMirror 6</text>
    </g>
  </g>

  <!-- Bottom-right terminal window -->
  <g transform="translate(840, 480)">
    <rect x="0" y="0" width="380" height="120" rx="12" fill="black" fill-opacity="0.5" stroke="white" stroke-opacity="0.1"/>
    <circle cx="20" cy="20" r="5" fill="#FF5F56"/>
    <circle cx="40" cy="20" r="5" fill="#FFBD2E"/>
    <circle cx="60" cy="20" r="5" fill="#27C93F"/>
    <text x="20" y="56" font-family="monospace" font-size="13" fill="#27C93F">z@ubu-prod-01</text>
    <text x="160" y="56" font-family="monospace" font-size="13" fill="#9B8E9B">:</text>
    <text x="170" y="56" font-family="monospace" font-size="13" fill="#3B73D4">~</text>
    <text x="180" y="56" font-family="monospace" font-size="13" fill="#9B8E9B">$</text>
    <text x="200" y="56" font-family="monospace" font-size="13" fill="#E0D8D8">systemctl status nginx</text>
    <text x="20" y="78" font-family="monospace" font-size="13" fill="#27C93F">●</text>
    <text x="36" y="78" font-family="monospace" font-size="13" fill="#E0D8D8">nginx.service - The NGINX HTTP server</text>
    <text x="20" y="98" font-family="monospace" font-size="13" fill="#9B8E9B">   Loaded: loaded · Active: </text>
    <text x="280" y="98" font-family="monospace" font-size="13" fill="#27C93F">active (running)</text>
  </g>
</svg>
