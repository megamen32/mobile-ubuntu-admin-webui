name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR/branch
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint + Type Check + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
        env:
          # Skip telemetry in CI
          NEXT_TELEMETRY_DISABLED: 1

  docker-build:
    name: Docker Build (smoke test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ubuntu-admin:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — image starts
        run: |
          docker run -d --name smoke -p 3001:3000 ubuntu-admin:ci
          sleep 5
          # Healthcheck endpoint should return 200
          for i in {1..10}; do
            if curl -fsS http://localhost:3001/api/health; then
              echo "✓ Health check passed"
              exit 0
            fi
            echo "Attempt $i: not ready yet, waiting..."
            sleep 2
          done
          echo "✗ Health check failed"
          docker logs smoke
          exit 1
